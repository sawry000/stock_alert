name: Stock Alert PRO

# ═══════════════════════════════════════════════════════════
#  Triggered by Google Apps Script via workflow_dispatch
#  ไม่มี schedule — GAS เป็นตัวเรียก
# ═══════════════════════════════════════════════════════════

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-alerts:
    name: "Check All Alert Types"
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Python ───────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # ❌ ลบ cache: pip ออก — เพราะไม่มี requirements.txt
          # cache: pip  ← ตัวนี้ทำให้ error และ skip steps ถัดไป

      # ── 3. Install dependencies ───────────────────────────
      - name: "📦 Install dependencies"
        run: |
          pip install --upgrade pip --quiet
          pip install yfinance --quiet
          echo "✅ yfinance: $(pip show yfinance | grep Version)"

      # ── 4. Validate watchlist.json ─────────────────────────
      - name: "🔍 Validate watchlist.json"
        run: |
          python3 -c "
          import json, sys
          try:
              with open('watchlist.json') as f:
                  data = json.load(f)
              stocks = data.get('watchlist', [])
              alerts_count = sum(len(s.get('alerts',[])) for s in stocks)
              print(f'✅ watchlist.json: {len(stocks)} symbols, {alerts_count} alerts')
          except Exception as e:
              print(f'❌ watchlist.json error: {e}')
              sys.exit(1)
          "

      # ── 5. Run Alert Engine ────────────────────────────────
      - name: "🚨 Run Alert Engine PRO"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🕐 UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "🕐 ICT: $(TZ='Asia/Bangkok' date '+%Y-%m-%d %H:%M:%S')"
          python3 alert_engine.py

      # ── 6. Commit state + log ──────────────────────────────
      - name: "💾 Commit state and log"
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json alert_log.json
          git diff --staged --quiet || git commit -m "chore: update alert state [skip ci]"
          git push || echo "Nothing to push"

      # ── 7. Upload log artifact ─────────────────────────────
      - name: "📤 Upload alert log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alert-log-${{ github.run_number }}
          path: alert_log.json
          retention-days: 7
