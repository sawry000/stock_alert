name: Stock Price Alert

"on":
  # Triggered by Google Apps Script on schedule
  # (GAS handles market-hours logic and calls workflow_dispatch)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance --quiet --break-system-packages || pip install yfinance --quiet

      - name: Run alert engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 alert_engine.py

      - name: Commit updated state and log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json alert_log.json
          git diff --staged --quiet || git commit -m "chore: update alert state [skip ci]"
          git push
